<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Game UI Studio — HYDRA</title>
<link rel="icon" type="image/svg+xml" href="./favicon.svg"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070810;--s1:#0b0d16;--s2:#10121d;--s3:#161926;--s4:#1c1f30;--s5:#22263a;
  --bd:#1e2135;--bd2:#262944;--text:#e0e2f0;--sub:#9496b0;--muted:#52546e;
  --hydra:#4ade80;--hs:rgba(74,222,128,.10);--hb:rgba(74,222,128,.25);
  --teal:#16b195;--blue:#3e62c0;--grad:linear-gradient(135deg,#16b195,#3e62c0);
  --red:#f43f5e;--amber:#f59e0b;--purple:#a855f7;
  --topbar:44px;--lw:218px;--rw:270px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;font-size:13px;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}

/* TOPBAR */
#topbar{height:var(--topbar);background:var(--s1);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:5px;padding:0 10px;flex-shrink:0;z-index:200;}
.logo{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap;}
.tdiv{width:1px;height:18px;background:var(--bd2);flex-shrink:0;margin:0 2px;}
#scene-name{background:transparent;border:none;color:var(--text);font-size:.78rem;font-weight:500;outline:none;width:148px;}
#scene-name:focus{background:var(--s3);border-radius:4px;padding:2px 6px;}
.ttools{display:flex;align-items:center;gap:2px;background:var(--s3);border:1px solid var(--bd);border-radius:7px;padding:2px;}
.ttool{width:28px;height:26px;border:1px solid transparent;background:transparent;color:var(--sub);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:.72rem;transition:all .1s;}
.ttool:hover{background:var(--s4);color:var(--text);}
.ttool.on{background:var(--hs);color:var(--hydra);border-color:var(--hb);}
.abar{display:flex;align-items:center;gap:1px;background:var(--s3);border:1px solid var(--bd);border-radius:7px;padding:2px;}
.abtn{width:26px;height:26px;border:none;background:transparent;color:var(--muted);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:.65rem;transition:all .1s;}
.abtn:hover{background:var(--s4);color:var(--text);}
.tgap{flex:1;}
.tgrp{display:flex;align-items:center;gap:3px;}
.tbtn{display:flex;align-items:center;gap:4px;padding:4px 8px;border-radius:6px;border:1px solid var(--bd2);background:var(--s2);color:var(--sub);font-size:.67rem;font-weight:600;transition:all .1s;white-space:nowrap;}
.tbtn:hover{background:var(--s3);color:var(--text);}
.tbtn.g{background:var(--hs);border-color:var(--hb);color:var(--hydra);}
.tbtn.g:hover{background:rgba(74,222,128,.18);}
.tbtn i{font-size:.6rem;}
.tsel{background:var(--s2);border:1px solid var(--bd2);color:var(--text);font-size:.67rem;padding:4px 7px;border-radius:6px;outline:none;}
.tsel:focus{border-color:var(--teal);}

/* WORKSPACE */
#ws{display:flex;flex:1;overflow:hidden;}

/* LEFT */
#lp{width:var(--lw);min-width:var(--lw);background:var(--s1);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden;}
.ltabs{display:flex;border-bottom:1px solid var(--bd);flex-shrink:0;}
.ltab{flex:1;padding:7px 0;font-size:.6rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);text-align:center;cursor:pointer;border-bottom:2px solid transparent;transition:all .1s;}
.ltab.on{color:var(--hydra);border-bottom-color:var(--hydra);}
#pal-panel,#lay-panel{flex:1;overflow-y:auto;display:none;}
#pal-panel.show,#lay-panel.show{display:block;}
.psearch{padding:6px 5px 4px;position:sticky;top:0;background:var(--s1);z-index:1;}
.psw{position:relative;}
.psw i{position:absolute;left:7px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.6rem;pointer-events:none;}
.psw input{width:100%;background:var(--s3);border:1px solid var(--bd2);color:var(--text);font-size:.67rem;padding:4px 7px 4px 22px;border-radius:6px;outline:none;}
.psw input:focus{border-color:var(--teal);}
.pbody{padding:3px 4px 8px;}
.pcat{font-size:.55rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding:7px 4px 3px;}
.pitem{display:flex;align-items:center;gap:7px;padding:5px 6px;border-radius:6px;cursor:pointer;border:1px solid transparent;margin-bottom:1px;transition:all .1s;user-select:none;}
.pitem:hover{background:var(--s3);border-color:var(--bd2);}
.pitem.placing{background:var(--hs);border-color:var(--hb);}
.pico{width:26px;height:26px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:.68rem;flex-shrink:0;}
.ptxt{display:flex;flex-direction:column;gap:1px;}
.pname{font-size:.68rem;font-weight:600;color:var(--text);}
.pdesc{font-size:.57rem;color:var(--muted);}
/* layers */
.litem{display:flex;align-items:center;gap:5px;padding:5px 8px;cursor:pointer;border-bottom:1px solid var(--bd);transition:background .08s;}
.litem:hover{background:var(--s2);}
.litem.on{background:var(--hs);}
.lic{font-size:.58rem;color:var(--muted);width:13px;text-align:center;}
.lname{flex:1;font-size:.67rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* CANVAS */
#ca{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#090a12;}
#ctbar{height:31px;background:var(--s1);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:3px;padding:0 8px;flex-shrink:0;}
.cbt{display:flex;align-items:center;gap:3px;padding:2px 7px;border-radius:5px;border:none;background:transparent;color:var(--muted);font-size:.62rem;font-weight:600;cursor:pointer;transition:all .1s;}
.cbt:hover{background:var(--s3);color:var(--text);}
.cbt.on{background:var(--s3);color:var(--hydra);}
.csep{width:1px;height:13px;background:var(--bd2);}
.czoom{font-size:.62rem;color:var(--muted);min-width:36px;text-align:center;}
.tplt{display:flex;align-items:center;gap:3px;padding:2px 7px;border-radius:5px;border:1px solid var(--bd2);background:var(--s2);color:var(--sub);font-size:.6rem;font-weight:600;cursor:pointer;transition:all .1s;}
.tplt:hover{background:var(--s3);color:var(--text);}
#vp{flex:1;position:relative;overflow:hidden;cursor:default;}
#vp.sel{cursor:default;}
#vp.pan{cursor:grab;}
#vp.pan.panning{cursor:grabbing;}
#vp.place{cursor:crosshair;}
#sc{position:absolute;transform-origin:0 0;}
#sc.grid::after{content:'';position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(var(--bd) 1px,transparent 1px),linear-gradient(90deg,var(--bd) 1px,transparent 1px);background-size:32px 32px;opacity:.28;}
#rb{position:absolute;border:1px solid var(--hydra);background:rgba(74,222,128,.05);pointer-events:none;display:none;z-index:1000;}
#ph{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(74,222,128,.12);border:1px solid var(--hb);color:var(--hydra);font-size:.67rem;font-weight:600;padding:4px 14px;border-radius:20px;pointer-events:none;z-index:200;display:none;}

/* COMPONENTS */
.gc{position:absolute;cursor:move;}
.gci{width:100%;height:100%;overflow:hidden;border-radius:3px;}
.gcring{position:absolute;inset:-1px;border:2px solid var(--hydra);border-radius:4px;pointer-events:none;display:none;}
.gc.sel .gcring{display:block;}
.gchh{position:absolute;inset:0;pointer-events:none;display:none;}
.gc.sel .gchh{display:block;}
.gch{position:absolute;width:8px;height:8px;background:#fff;border:1.5px solid var(--hydra);border-radius:2px;pointer-events:all;z-index:10;}
.gch.nw{top:-4px;left:-4px;cursor:nw-resize;}
.gch.n{top:-4px;left:calc(50% - 4px);cursor:n-resize;}
.gch.ne{top:-4px;right:-4px;cursor:ne-resize;}
.gch.e{top:calc(50% - 4px);right:-4px;cursor:e-resize;}
.gch.se{bottom:-4px;right:-4px;cursor:se-resize;}
.gch.s{bottom:-4px;left:calc(50% - 4px);cursor:s-resize;}
.gch.sw{bottom:-4px;left:-4px;cursor:sw-resize;}
.gch.w{top:calc(50% - 4px);left:-4px;cursor:w-resize;}
.gcrl{position:absolute;top:-24px;left:calc(50% - 0.5px);width:1px;height:24px;background:var(--hydra);pointer-events:none;}
.gcrh{position:absolute;top:-32px;left:calc(50% - 6px);width:12px;height:12px;background:var(--hydra);border-radius:50%;border:2px solid #fff;cursor:crosshair;pointer-events:all;z-index:10;}
.gctag{position:absolute;top:-20px;left:0;font-size:.5rem;font-weight:700;color:var(--hydra);letter-spacing:.05em;text-transform:uppercase;background:rgba(0,0,0,.85);padding:1px 5px;border-radius:3px;white-space:nowrap;pointer-events:none;}

/* THEMES */
.td .gci{background:rgba(10,12,20,.92);border:1px solid rgba(74,222,128,.18);--ca:#4ade80;--ct:#e2e4ef;--cb:rgba(74,222,128,.06);--slot:rgba(255,255,255,.05);--sb:rgba(74,222,128,.15);}
.tf .gci{background:rgba(12,7,3,.9);border:1px solid #7a5c10;--ca:#d4960a;--ct:#e8d090;--cb:rgba(200,140,20,.12);--slot:rgba(5,3,1,.7);--sb:rgba(140,100,20,.4);}
.tc .gci{background:rgba(4,8,18,.93);border:1px solid rgba(0,255,255,.3);--ca:#0ff;--ct:#c0f0ff;--cb:rgba(0,255,255,.08);--slot:rgba(0,3,8,.8);--sb:rgba(0,255,255,.2);}
.tq .gci{background:rgba(0,0,0,.75);border:1px solid rgba(255,255,255,.18);--ca:#fff;--ct:#fff;--cb:rgba(255,255,255,.06);--slot:rgba(255,255,255,.06);--sb:rgba(255,255,255,.15);}

/* component inner CSS */
.gtitle{font-size:.57rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ca);padding:4px 6px 3px;border-bottom:1px solid var(--sb);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sgrid{display:grid;gap:3px;padding:5px;}
.gslot{background:var(--slot);border:1px solid var(--sb);border-radius:3px;display:flex;align-items:center;justify-content:center;}
.hbrow{display:flex;gap:3px;padding:5px;align-items:center;justify-content:center;height:100%;}
.hbsl{background:var(--slot);border:1px solid var(--sb);border-radius:3px;display:flex;align-items:flex-end;justify-content:flex-end;padding:2px;flex-shrink:0;}
.hbnum{font-size:.46rem;color:var(--ca);line-height:1;}
.bwrap{padding:5px 7px;display:flex;flex-direction:column;gap:3px;height:100%;justify-content:center;}
.brow{display:flex;justify-content:space-between;}
.blbl{font-size:.57rem;font-weight:700;color:var(--ca);letter-spacing:.05em;}
.bval{font-size:.55rem;color:var(--ct);}
.btrack{background:rgba(0,0,0,.5);border:1px solid var(--sb);border-radius:20px;overflow:hidden;height:8px;}
.bfill{height:100%;border-radius:20px;}
.xpfill{background:linear-gradient(90deg,#f59e0b,#fcd34d)!important;}
.mmwrap{width:100%;height:100%;position:relative;overflow:hidden;}
.mmbg{position:absolute;inset:0;background:radial-gradient(circle,rgba(30,60,40,.6),rgba(5,15,10,.9));}
.mmgrid{position:absolute;inset:0;background-image:linear-gradient(rgba(74,222,128,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(74,222,128,.07) 1px,transparent 1px);background-size:18px 18px;}
.mmdot{width:5px;height:5px;border-radius:50%;background:#4ade80;position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 4px #4ade80;z-index:2;}
.mmbd{position:absolute;inset:0;border-radius:inherit;border:1px solid var(--sb);}
.pwrap{display:flex;flex-direction:column;align-items:center;padding:5px;gap:3px;height:100%;justify-content:center;}
.pface{flex:1;width:100%;background:var(--slot);border:1px solid var(--sb);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:var(--ca);min-height:0;}
.pname{font-size:.57rem;font-weight:700;color:var(--ct);letter-spacing:.05em;}
.plvl{font-size:.53rem;color:var(--ca);}
.cwrap{display:flex;align-items:center;gap:5px;padding:3px 7px;height:100%;}
.camt{font-size:.76rem;font-weight:700;color:var(--ca);}
.clbl{font-size:.53rem;color:var(--ct);}
.chatwrap{display:flex;flex-direction:column;height:100%;}
.chatmsgs{flex:1;padding:3px 5px;display:flex;flex-direction:column;gap:2px;overflow:hidden;justify-content:flex-end;}
.chatmsg{font-size:.51rem;line-height:1.4;}
.chatu{color:var(--ca);font-weight:600;}
.chatt{color:var(--ct);}
.chatinp{display:flex;gap:3px;padding:3px 5px;border-top:1px solid var(--sb);}
.chatfake{flex:1;height:15px;background:var(--slot);border:1px solid var(--sb);border-radius:3px;}
.eqgrid{display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:repeat(4,1fr);gap:3px;padding:5px;height:100%;}
.eqsl{background:var(--slot);border:1px solid var(--sb);border-radius:3px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;}
.eqsl i{font-size:.58rem;color:var(--ca);}
.eqn{font-size:.38rem;color:var(--muted);letter-spacing:.04em;}
.stwrap{position:relative;width:100%;height:100%;overflow:hidden;}
.stnode{position:absolute;width:28px;height:28px;border-radius:50%;background:var(--slot);border:2px solid var(--sb);display:flex;align-items:center;justify-content:center;}
.stnode.on{background:var(--cb);border-color:var(--ca);}
.stnode i{font-size:.55rem;color:var(--ca);}
.stedge{position:absolute;background:var(--sb);transform-origin:left center;}
.shwrap{display:flex;flex-direction:column;height:100%;}
.shitems{flex:1;padding:3px 5px;display:flex;flex-direction:column;gap:2px;overflow:hidden;}
.shitem{display:flex;align-items:center;gap:4px;padding:3px 4px;border-radius:3px;background:var(--slot);border:1px solid var(--sb);}
.shico{width:17px;height:17px;border-radius:3px;background:var(--cb);display:flex;align-items:center;justify-content:center;font-size:.56rem;}
.shnm{flex:1;font-size:.54rem;color:var(--ct);}
.shpr{font-size:.54rem;font-weight:700;color:var(--ca);}
.shbuy{margin:3px 5px 4px;padding:3px;border-radius:4px;text-align:center;background:var(--cb);border:1px solid var(--sb);font-size:.54rem;font-weight:700;color:var(--ca);}
.xhwrap{display:flex;align-items:center;justify-content:center;height:100%;color:var(--ca,rgba(255,255,255,.9));position:relative;}
.xhwrap::before,.xhwrap::after{content:'';position:absolute;background:currentColor;border-radius:1px;}
.xhwrap::before{width:11px;height:1.5px;}
.xhwrap::after{width:1.5px;height:11px;}
.xhdot{width:3px;height:3px;border-radius:50%;border:1px solid currentColor;position:absolute;}
.txwrap{display:flex;align-items:center;height:100%;padding:0 5px;}
.txin{color:var(--ct,#fff);font-weight:600;}

/* RIGHT PANEL */
#rp{width:var(--rw);min-width:var(--rw);background:var(--s1);border-left:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden;}
.rtabs{display:flex;border-bottom:1px solid var(--bd);flex-shrink:0;}
.rtab{flex:1;padding:7px 0;font-size:.59rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);text-align:center;cursor:pointer;border-bottom:2px solid transparent;transition:all .1s;}
.rtab.on{color:var(--hydra);border-bottom-color:var(--hydra);}
#rpd,#rpc,#rpa{flex:1;overflow:hidden;display:none;flex-direction:column;}
#rpd.show,#rpc.show,#rpa.show{display:flex;}
#rpd{overflow-y:auto;}
#rpc{overflow-y:auto;}
/* design props */
.psec{padding:9px 10px 4px;border-bottom:1px solid var(--bd);}
.psec:last-child{border-bottom:none;}
.pslbl{font-size:.56rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.pr{display:flex;align-items:center;gap:5px;margin-bottom:5px;}
.plbl{font-size:.62rem;color:var(--sub);min-width:50px;flex-shrink:0;}
.pi,.psel{flex:1;background:var(--s3);border:1px solid var(--bd2);color:var(--text);font-size:.67rem;padding:3px 6px;border-radius:5px;outline:none;}
.pi:focus,.psel:focus{border-color:var(--teal);}
.pxy{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.pxy .pi{width:100%;}
.pcol{width:24px;height:22px;padding:0;border:1px solid var(--bd2);border-radius:4px;cursor:pointer;flex-shrink:0;}
.pempty{padding:18px 10px;text-align:center;color:var(--muted);font-size:.67rem;line-height:1.6;}
.pempty i{font-size:1rem;display:block;margin-bottom:7px;opacity:.3;}
.pdel{width:100%;padding:6px;border-radius:6px;border:1px solid rgba(244,63,94,.3);background:rgba(244,63,94,.07);color:var(--red);font-size:.64rem;font-weight:700;cursor:pointer;margin-top:4px;transition:all .1s;}
.pdel:hover{background:rgba(244,63,94,.14);}
.ptogrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.ptoglbl{font-size:.62rem;color:var(--sub);}
.ptog{width:28px;height:15px;background:var(--s4);border:1px solid var(--bd2);border-radius:8px;position:relative;cursor:pointer;transition:background .15s;flex-shrink:0;}
.ptog.on{background:var(--hs);border-color:var(--hb);}
.ptog::after{content:'';position:absolute;width:9px;height:9px;background:var(--muted);border-radius:50%;top:2px;left:2px;transition:all .15s;}
.ptog.on::after{left:15px;background:var(--hydra);}
/* AI panel */
#amsgs{flex:1;overflow-y:auto;padding:7px;display:flex;flex-direction:column;gap:6px;}
.amsg{display:flex;flex-direction:column;gap:2px;}
.arole{font-size:.52rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;}
.amsg.user .arole{color:var(--sub);}
.amsg.ai .arole{color:var(--hydra);}
.abub{font-size:.66rem;line-height:1.5;background:var(--s2);border:1px solid var(--bd);border-radius:6px;padding:5px 8px;color:var(--text);word-break:break-word;}
.amsg.user .abub{background:var(--s3);}
.abub.aerr{color:var(--red);background:rgba(244,63,94,.07);border-color:rgba(244,63,94,.2);}
.athink{display:flex;align-items:center;gap:5px;font-size:.66rem;color:var(--muted);padding:5px 8px;background:var(--s2);border:1px solid var(--bd);border-radius:6px;}
.adot{width:4px;height:4px;border-radius:50%;background:var(--hydra);animation:dd 1s infinite;}
.adot:nth-child(2){animation-delay:.15s;}.adot:nth-child(3){animation-delay:.3s;}
@keyframes dd{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}
#aftr{border-top:1px solid var(--bd);padding:6px;display:flex;flex-direction:column;gap:5px;flex-shrink:0;}
.aqrow{display:flex;flex-wrap:wrap;gap:3px;}
.aqbtn{font-size:.56rem;font-weight:600;padding:2px 6px;border-radius:10px;border:1px solid var(--bd2);background:var(--s2);color:var(--sub);cursor:pointer;transition:all .1s;}
.aqbtn:hover{background:var(--s3);color:var(--text);}
.ainrow{display:flex;gap:4px;}
#aiin{flex:1;background:var(--s3);border:1px solid var(--bd2);color:var(--text);font-size:.67rem;padding:6px 8px;border-radius:7px;resize:none;outline:none;height:54px;}
#aiin:focus{border-color:var(--teal);}
#aisend{width:32px;height:54px;border-radius:7px;border:1px solid var(--hb);background:var(--hs);color:var(--hydra);display:flex;align-items:center;justify-content:center;font-size:.76rem;transition:all .1s;flex-shrink:0;}
#aisend:hover{background:rgba(74,222,128,.18);}
#aisend:disabled{opacity:.4;cursor:not-allowed;}
.aicfg{display:flex;align-items:center;gap:5px;}
.aicfgl{font-size:.57rem;color:var(--muted);flex-shrink:0;}
#aikey{flex:1;background:var(--s3);border:1px solid var(--bd2);color:var(--text);font-size:.59rem;padding:3px 6px;border-radius:5px;outline:none;}
#aikey:focus{border-color:var(--teal);}

/* STATUSBAR */
#sb{height:22px;background:var(--s1);border-top:1px solid var(--bd);display:flex;align-items:center;padding:0 10px;gap:10px;flex-shrink:0;}
.si{font-size:.59rem;color:var(--muted);display:flex;align-items:center;gap:3px;}
.sdiv{width:1px;height:10px;background:var(--bd2);}
.shi{color:var(--hydra);}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;display:none;align-items:center;justify-content:center;}
.overlay.show{display:flex;}
.modal{background:var(--s2);border:1px solid var(--bd2);border-radius:10px;padding:18px;max-width:450px;width:90%;}
.modal h3{font-family:'Space Grotesk',sans-serif;font-size:.83rem;font-weight:700;margin-bottom:10px;}
.mtarea{width:100%;min-height:90px;background:var(--s3);border:1px solid var(--bd2);color:var(--text);font-size:.65rem;padding:7px;border-radius:6px;resize:vertical;outline:none;margin-top:5px;font-family:monospace;}
.mtarea:focus{border-color:var(--teal);}
.mbtns{display:flex;gap:6px;justify-content:flex-end;margin-top:12px;}
.mbtn{padding:5px 13px;border-radius:6px;border:1px solid var(--bd2);font-size:.67rem;font-weight:600;cursor:pointer;transition:all .1s;}
.mbtn.p{background:var(--hs);border-color:var(--hb);color:var(--hydra);}
.mbtn.s{background:var(--s3);color:var(--sub);}
</style>
</head>
<body>

<div id="topbar">
  <div class="logo">UI Studio</div>
  <div class="tdiv"></div>
  <input id="scene-name" value="Untitled Layout" maxlength="40"/>
  <div class="tdiv"></div>
  <div class="ttools">
    <button class="ttool on" id="t-sel" title="Select (V)" onclick="setTool('sel')"><i class="fa fa-arrow-pointer"></i></button>
    <button class="ttool" id="t-pan" title="Pan (H / Space)" onclick="setTool('pan')"><i class="fa fa-hand"></i></button>
  </div>
  <div class="tdiv"></div>
  <div class="abar">
    <button class="abtn" title="Align Left"     onclick="align('left')"><i class="fa fa-align-left"></i></button>
    <button class="abtn" title="Center H"       onclick="align('cx')"><i class="fa fa-align-center"></i></button>
    <button class="abtn" title="Align Right"    onclick="align('right')"><i class="fa fa-align-right"></i></button>
    <div style="width:1px;height:14px;background:var(--bd2);margin:0 1px"></div>
    <button class="abtn" title="Align Top"      onclick="align('top')"><i class="fa fa-arrow-up"></i></button>
    <button class="abtn" title="Center V"       onclick="align('cy')"><i class="fa fa-minus"></i></button>
    <button class="abtn" title="Align Bottom"   onclick="align('bot')"><i class="fa fa-arrow-down"></i></button>
    <div style="width:1px;height:14px;background:var(--bd2);margin:0 1px"></div>
    <button class="abtn" title="Bring Forward"  onclick="zord(1)"><i class="fa fa-layer-group"></i></button>
    <button class="abtn" title="Send Backward"  onclick="zord(-1)"><i class="fa fa-layer-minus" style="font-size:.55rem"></i></button>
  </div>
  <div class="tdiv"></div>
  <select class="tsel" id="res-sel" onchange="setRes(this.value)">
    <option value="1920x1080">1920×1080</option>
    <option value="1280x720">1280×720</option>
    <option value="2560x1440">2560×1440</option>
    <option value="1366x768">1366×768</option>
    <option value="800x600">800×600</option>
  </select>
  <select class="tsel" id="theme-sel" onchange="setTheme(this.value)">
    <option value="d">Hydra Dark</option>
    <option value="f">Fantasy</option>
    <option value="c">Cyberpunk</option>
    <option value="q">FPS</option>
  </select>
  <div class="tgap"></div>
  <div class="tgrp">
    <button class="tbtn" onclick="dup()"><i class="fa fa-copy"></i> Dup</button>
    <button class="tbtn" onclick="showLoad()"><i class="fa fa-folder-open"></i> Load</button>
    <button class="tbtn" onclick="doSave()"><i class="fa fa-floppy-disk"></i> Save</button>
    <button class="tbtn g" onclick="doExport()"><i class="fa fa-download"></i> Export</button>
  </div>
</div>

<div id="ws">
  <div id="lp">
    <div class="ltabs">
      <div class="ltab on" id="lt-pal" onclick="setLT('pal')">Components</div>
      <div class="ltab" id="lt-lay" onclick="setLT('lay')">Layers</div>
    </div>
    <div id="pal-panel" class="show">
      <div class="psearch"><div class="psw"><i class="fa fa-search"></i><input type="text" placeholder="Search…" oninput="filterPal(this.value)"/></div></div>
      <div class="pbody" id="pbody"></div>
    </div>
    <div id="lay-panel"><div id="laybody"></div></div>
  </div>

  <div id="ca">
    <div id="ctbar">
      <button class="cbt" onclick="zoomBy(-0.1)"><i class="fa fa-minus"></i></button>
      <span class="czoom" id="zlbl">45%</span>
      <button class="cbt" onclick="zoomBy(0.1)"><i class="fa fa-plus"></i></button>
      <button class="cbt" onclick="fitView()"><i class="fa fa-expand"></i></button>
      <div class="csep"></div>
      <button class="cbt on" id="btn-grid" onclick="toggleGrid()"><i class="fa fa-grid-3x3"></i> Grid</button>
      <button class="cbt on" id="btn-snap" onclick="toggleSnap()"><i class="fa fa-magnet"></i> Snap</button>
      <div class="csep"></div>
      <button class="tplt" onclick="tpl('rpg')"><i class="fa fa-dragon"></i> RPG</button>
      <button class="tplt" onclick="tpl('fps')"><i class="fa fa-crosshairs"></i> FPS</button>
      <button class="tplt" onclick="tpl('moba')"><i class="fa fa-map"></i> MOBA</button>
      <button class="tplt" onclick="tpl('inv')"><i class="fa fa-box"></i> Inventory</button>
      <div class="csep"></div>
      <button class="cbt" onclick="clearAll()"><i class="fa fa-trash"></i></button>
    </div>
    <div id="vp" class="sel">
      <div id="ph">Click to place — Esc to cancel</div>
      <div id="rb"></div>
      <div id="sc" class="grid"></div>
    </div>
  </div>

  <div id="rp">
    <div class="rtabs">
      <div class="rtab on" id="rt-d" onclick="setRT('d')">Design</div>
      <div class="rtab"    id="rt-c" onclick="setRT('c')">Component</div>
      <div class="rtab"    id="rt-a" onclick="setRT('a')">AI</div>
    </div>
    <div id="rpd" class="show"></div>
    <div id="rpc"></div>
    <div id="rpa">
      <div id="amsgs"></div>
      <div id="aftr">
        <div class="aqrow" id="aqrow"></div>
        <div class="ainrow">
          <textarea id="aiin" placeholder="Describe what to build…&#10;e.g. 'RPG HUD 1920×1080 fantasy'" onkeydown="aiKey(event)"></textarea>
          <button id="aisend" onclick="sendAI()"><i class="fa fa-arrow-up"></i></button>
        </div>
        <div class="aicfg">
          <span class="aicfgl">API Key</span>
          <input type="password" id="aikey" placeholder="sk-ant-… (optional)" oninput="G.ai.key=this.value;lsSet('gsk',this.value)"/>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="sb">
  <div class="si shi" id="sb-tool"><i class="fa fa-arrow-pointer"></i> Select</div>
  <div class="sdiv"></div>
  <div class="si" id="sb-xy">0, 0</div>
  <div class="sdiv"></div>
  <div class="si"><span id="sb-cnt">0</span> components</div>
  <div class="sdiv"></div>
  <div class="si" id="sb-res">1920 × 1080</div>
  <div style="flex:1"></div>
  <div class="si"><a href="/" style="color:var(--muted);text-decoration:none">← UI Kit</a></div>
  <div class="sdiv"></div>
  <div class="si"><a href="/hotkeys" style="color:var(--muted);text-decoration:none">Hotkeys</a></div>
</div>

<div class="overlay" id="modal-load">
  <div class="modal">
    <h3><i class="fa fa-folder-open" style="color:var(--teal)"></i> Load Scene</h3>
    <p style="font-size:.67rem;color:var(--sub)">Paste exported JSON.</p>
    <textarea class="mtarea" id="ljson" placeholder='{"name":"...","comps":[]}'></textarea>
    <div class="mbtns">
      <button class="mbtn s" onclick="closeModal()">Cancel</button>
      <button class="mbtn p" onclick="doLoad()">Load</button>
    </div>
  </div>
</div>

<script>
/* ─── STATE ─── */
const G={
  scene:{name:'Untitled Layout',resolution:{w:1920,h:1080},theme:'d',comps:[]},
  sel:new Set(),
  tool:'sel',
  placing:null,
  vp:{x:0,y:0,z:0.45},
  grid:true,snap:true,snapSz:16,
  drag:null,
  ai:{msgs:[],busy:false,key:lsGet('gsk')}
};
function lsGet(k){try{return localStorage.getItem(k)||''}catch{return ''}}
function lsSet(k,v){try{localStorage.setItem(k,v)}catch{}}

/* ─── DEFS ─── */
const D={
  'inventory-grid':{l:'Inventory Grid',i:'fa-grip',cat:'Storage',col:'#4ade80',d:'N×M item slots',w:320,h:256,p:{cols:5,rows:4,slotSize:52,gap:3,label:'Inventory'}},
  'equipment-slots':{l:'Equipment',i:'fa-shirt',cat:'Storage',col:'#4ade80',d:'Gear slots',w:200,h:280,p:{label:'Equipment'}},
  'hotbar':{l:'Hotbar',i:'fa-bars',cat:'Action',col:'#f59e0b',d:'Quick-use bar',w:480,h:64,p:{slots:8,slotSize:54,label:''}},
  'healthbar':{l:'Health Bar',i:'fa-heart',cat:'HUD',col:'#f43f5e',d:'HP bar',w:240,h:28,p:{value:80,max:100,label:'HP',color:'#e11d48'}},
  'manabar':{l:'Mana Bar',i:'fa-droplet',cat:'HUD',col:'#3b82f6',d:'MP bar',w:200,h:22,p:{value:60,max:100,label:'MP',color:'#3b82f6'}},
  'xp-bar':{l:'XP Bar',i:'fa-star',cat:'HUD',col:'#f59e0b',d:'XP progress',w:280,h:13,p:{value:45,max:100,label:'XP',color:'#f59e0b'}},
  'minimap':{l:'Minimap',i:'fa-map',cat:'Navigation',col:'#16b195',d:'World map',w:160,h:160,p:{shape:'circle',label:''}},
  'portrait':{l:'Portrait',i:'fa-user',cat:'HUD',col:'#a855f7',d:'Face+name+level',w:88,h:100,p:{name:'Player',level:1}},
  'currency-display':{l:'Currency',i:'fa-coins',cat:'HUD',col:'#f59e0b',d:'Gold/coins',w:120,h:32,p:{amount:1250,label:'Gold'}},
  'chat-window':{l:'Chat',i:'fa-comments',cat:'Social',col:'#8b8b9a',d:'Chat window',w:300,h:190,p:{label:'Chat'}},
  'skill-tree':{l:'Skill Tree',i:'fa-sitemap',cat:'Progress',col:'#a855f7',d:'Ability nodes',w:340,h:260,p:{label:'Skills'}},
  'shop-panel':{l:'Shop',i:'fa-store',cat:'Economy',col:'#f59e0b',d:'Buy/sell UI',w:280,h:340,p:{label:'Shop'}},
  'crosshair':{l:'Crosshair',i:'fa-crosshairs',cat:'FPS',col:'#fff',d:'Aim reticle',w:40,h:40,p:{}},
  'text-label':{l:'Text Label',i:'fa-font',cat:'UI',col:'#8b8b9a',d:'Static text',w:200,h:28,p:{text:'Label',size:14,align:'left'}},
};
const CATS=['Storage','Action','HUD','Navigation','Social','Progress','Economy','FPS','UI'];
const THEMENM={d:'Hydra Dark',f:'Fantasy',c:'Cyberpunk',q:'FPS'};

/* ─── UTILS ─── */
const uid=()=>'c'+Math.random().toString(36).slice(2,8);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const snapV=v=>G.snap?Math.round(v/G.snapSz)*G.snapSz:Math.round(v);
const h2rgb=h=>{const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return `${r},${g},${b}`;};
const gc=id=>G.scene.comps.find(c=>c.id===id);
const selArr=()=>[...G.sel].map(id=>gc(id)).filter(Boolean);
const selOne=()=>G.sel.size===1?gc([...G.sel][0]):null;
const VP=()=>document.getElementById('vp');
const SC=()=>document.getElementById('sc');

function vpToScene(cx,cy){
  const r=VP().getBoundingClientRect();
  return{x:(cx-r.left-G.vp.x)/G.vp.z,y:(cy-r.top-G.vp.y)/G.vp.z};
}

/* ─── RENDER ─── */
function applyVp(){
  SC().style.transform=`translate(${G.vp.x}px,${G.vp.y}px) scale(${G.vp.z})`;
  document.getElementById('zlbl').textContent=Math.round(G.vp.z*100)+'%';
}

function renderAll(){
  const sc=SC(),{w,h}=G.scene.resolution;
  sc.style.width=w+'px'; sc.style.height=h+'px';
  sc.className=(G.grid?'grid':'')+' ';
  sc.innerHTML=G.scene.comps.map(compEl).join('');
  applyVp();
  document.getElementById('sb-cnt').textContent=G.scene.comps.length;
  document.getElementById('sb-res').textContent=`${w} × ${h}`;
  renderLayers();
  renderDesign();
  renderCompProps();
}

function compEl(c){
  const sel=G.sel.has(c.id), only=sel&&G.sel.size===1;
  const rot=c.rot||0, op=c.op!==undefined?c.op:1, br=c.br||0;
  const shd=c.shd?'drop-shadow(0 4px 14px rgba(0,0,0,.65))':'';
  const handles=only?`
    <div class="gchh">
      <div class="gcrl"></div><div class="gcrh" data-h="rot"></div>
      <div class="gch nw" data-h="nw"></div><div class="gch n" data-h="n"></div>
      <div class="gch ne" data-h="ne"></div><div class="gch e" data-h="e"></div>
      <div class="gch se" data-h="se"></div><div class="gch s" data-h="s"></div>
      <div class="gch sw" data-h="sw"></div><div class="gch w" data-h="w"></div>
    </div>
    <div class="gcring"></div>
    <div class="gctag">${D[c.type]?.l||c.type}</div>`
    :(sel?'<div class="gcring"></div>':'');
  return `<div class="gc t${G.scene.theme} ${sel?'sel':''}" id="g${c.id}" data-id="${c.id}"
    style="left:${c.x}px;top:${c.y}px;width:${c.w}px;height:${c.h}px;transform:rotate(${rot}deg);opacity:${op};filter:${shd}">
    <div class="gci" style="border-radius:${br}px">${compInner(c)}</div>${handles}</div>`;
}

function compInner(c){
  const p=c.props||{};
  switch(c.type){
    case 'inventory-grid':{
      const cols=p.cols||5,rows=p.rows||4,ss=Math.min(p.slotSize||52,Math.floor((c.w-14)/cols)-4);
      return `${p.label?`<div class="gtitle">${p.label}</div>`:''}
        <div class="sgrid" style="grid-template-columns:repeat(${cols},${ss}px);gap:${p.gap||3}px">${Array.from({length:cols*rows},(_,i)=>`<div class="gslot" style="width:${ss}px;height:${ss}px"></div>`).join('')}</div>`;
    }
    case 'equipment-slots':{
      const sl=[{i:'fa-hat-wizard',n:'Head'},{i:'fa-shield',n:'Off'},{i:'fa-ring',n:'Neck'},{i:'fa-vest',n:'Chest'},{i:'fa-hand-fist',n:'Main'},{i:'fa-gem',n:'Ring'},{i:'fa-person',n:'Legs'},{i:'fa-shoe-prints',n:'Feet'},{i:'fa-tag',n:'Trinket'}];
      return `${p.label?`<div class="gtitle">${p.label}</div>`:''}<div class="eqgrid">${sl.map(s=>`<div class="eqsl"><i class="fa ${s.i}"></i><span class="eqn">${s.n}</span></div>`).join('')}</div>`;
    }
    case 'hotbar':{
      const n=p.slots||8,ss=Math.min(p.slotSize||54,Math.floor((c.w-14)/n)-4);
      return `<div class="hbrow">${Array.from({length:n},(_,i)=>`<div class="hbsl" style="width:${ss}px;height:${ss}px"><span class="hbnum">${i+1}</span></div>`).join('')}</div>`;
    }
    case 'healthbar':case 'manabar':case 'xp-bar':{
      const pct=clamp(((p.value||75)/(p.max||100))*100,0,100);
      const col=p.color||(c.type==='healthbar'?'#e11d48':c.type==='manabar'?'#3b82f6':'#f59e0b');
      const cls=c.type==='xp-bar'?'bfill xpfill':'bfill';
      return `<div class="bwrap"><div class="brow"><span class="blbl">${p.label||'HP'}</span><span class="bval">${p.value||75}/${p.max||100}</span></div>
        <div class="btrack"><div class="${cls}" style="width:${pct}%;background:${col}"></div></div></div>`;
    }
    case 'minimap':{
      const ci=p.shape!=='square';
      return `<div class="mmwrap" style="${ci?'border-radius:50%':''}"><div class="mmbg" style="${ci?'border-radius:50%':''}"></div><div class="mmgrid"></div><div class="mmdot"></div><div class="mmbd" style="${ci?'border-radius:50%':''}"></div></div>`;
    }
    case 'portrait':
      return `<div class="pwrap"><div class="pface"><i class="fa fa-user"></i></div><div class="pname">${p.name||'Player'}</div><div class="plvl">Lv ${p.level||1}</div></div>`;
    case 'currency-display':
      return `<div class="cwrap"><span style="font-size:.82rem">💰</span><span class="camt">${(p.amount||0).toLocaleString()}</span><span class="clbl">${p.label||'Gold'}</span></div>`;
    case 'chat-window':
      return `${p.label?`<div class="gtitle">${p.label}</div>`:''}<div class="chatwrap"><div class="chatmsgs">
        <div class="chatmsg"><span class="chatu">HYDRA: </span><span class="chatt">Welcome!</span></div>
        <div class="chatmsg"><span class="chatu">Player: </span><span class="chatt">GG</span></div>
      </div><div class="chatinp"><div class="chatfake"></div></div></div>`;
    case 'skill-tree':{
      const ns=[{x:50,y:10,i:'fa-bolt',on:true},{x:20,y:42,i:'fa-fire'},{x:80,y:42,i:'fa-shield'},{x:5,y:72,i:'fa-wand-sparkles'},{x:50,y:72,i:'fa-star',on:true},{x:90,y:72,i:'fa-sword'}];
      const es=[{x1:50,y1:26,x2:20,y2:42},{x1:50,y1:26,x2:80,y2:42},{x1:20,y1:58,x2:5,y2:72},{x1:50,y1:26,x2:50,y2:72},{x1:80,y1:58,x2:90,y2:72}];
      const edg=es.map(e=>{const dx=e.x2-e.x1,dy=e.y2-e.y1,l=Math.sqrt(dx*dx+dy*dy),a=Math.atan2(dy,dx)*180/Math.PI;return`<div class="stedge" style="left:${e.x1}%;top:${e.y1}%;width:${l}%;height:1px;transform:rotate(${a}deg)"></div>`;}).join('');
      const nds=ns.map(n=>`<div class="stnode ${n.on?'on':''}" style="left:calc(${n.x}% - 14px);top:calc(${n.y}% - 14px)"><i class="fa ${n.i}"></i></div>`).join('');
      return `${p.label?`<div class="gtitle">${p.label}</div>`:''}<div class="stwrap">${edg}${nds}</div>`;
    }
    case 'shop-panel':{
      const it=[{e:'⚔️',n:'Iron Sword',p:'150g'},{e:'🛡️',n:'Shield',p:'80g'},{e:'🧪',n:'Potion',p:'25g'}];
      return `${p.label?`<div class="gtitle">${p.label}</div>`:''}<div class="shwrap"><div class="shitems">${it.map(i=>`<div class="shitem"><div class="shico">${i.e}</div><span class="shnm">${i.n}</span><span class="shpr">${i.p}</span></div>`).join('')}</div><div class="shbuy">BUY</div></div>`;
    }
    case 'crosshair':
      return `<div class="xhwrap"><div class="xhdot"></div></div>`;
    case 'text-label':
      return `<div class="txwrap"><span class="txin" style="font-size:${p.size||14}px;text-align:${p.align||'left'}">${p.text||'Label'}</span></div>`;
    default:
      return `<div style="padding:5px;font-size:.57rem;color:var(--muted)">${c.type}</div>`;
  }
}

function renderLayers(){
  document.getElementById('laybody').innerHTML=[...G.scene.comps].reverse().map(c=>`
    <div class="litem ${G.sel.has(c.id)?'on':''}" onclick="layClick('${c.id}',event)">
      <i class="lic fa ${D[c.type]?.i||'fa-square'}"></i>
      <span class="lname">${D[c.type]?.l||c.type}</span>
    </div>`).join('');
}
function layClick(id,e){
  if(e.shiftKey)G.sel.has(id)?G.sel.delete(id):G.sel.add(id);
  else{G.sel.clear();G.sel.add(id);}
  renderAll();
}

/* ─── PALETTE ─── */
function buildPal(filter=''){
  const cats={};
  Object.entries(D).forEach(([t,d])=>{
    if(filter&&!d.l.toLowerCase().includes(filter.toLowerCase())&&!d.cat.toLowerCase().includes(filter.toLowerCase()))return;
    if(!cats[d.cat])cats[d.cat]=[];
    cats[d.cat].push({t,...d});
  });
  document.getElementById('pbody').innerHTML=CATS.filter(c=>cats[c]).map(cat=>
    `<div class="pcat">${cat}</div>`+
    cats[cat].map(d=>`<div class="pitem ${G.placing===d.t?'placing':''}" onclick="startPlace('${d.t}')">
      <div class="pico" style="background:rgba(${h2rgb(d.col)},.12);color:${d.col}"><i class="fa ${d.i}"></i></div>
      <div class="ptxt"><span class="pname">${d.l}</span><span class="pdesc">${d.d}</span></div>
    </div>`).join('')
  ).join('');
}
function filterPal(v){buildPal(v);}

/* ─── VIEWPORT EVENTS ─── */
function initVP(){
  const vp=VP();
  vp.addEventListener('mousedown',vpDown);
  vp.addEventListener('mousemove',vpMove);
  vp.addEventListener('mouseup',vpUp);
  vp.addEventListener('mouseleave',vpUp);
  vp.addEventListener('wheel',vpWheel,{passive:false});
  vp.addEventListener('contextmenu',e=>e.preventDefault());
  SC().addEventListener('mousedown',scDown);
  vp.addEventListener('click',vpClick);
}

function vpDown(e){
  if(e.button===1||(G.tool==='pan'&&e.button===0)){
    G.drag={type:'pan',sx:e.clientX,sy:e.clientY,ox:G.vp.x,oy:G.vp.y};
    VP().classList.add('panning'); return;
  }
  if(G.placing||G.tool!=='sel') return;
  // rubber band on background
  const t=e.target;
  if(t===VP()||t===SC()){
    const r=VP().getBoundingClientRect();
    G.drag={type:'rubber',sx:e.clientX-r.left,sy:e.clientY-r.top};
    const rb=document.getElementById('rb');
    rb.style.cssText=`display:block;left:${G.drag.sx}px;top:${G.drag.sy}px;width:0;height:0`;
    if(!e.shiftKey){G.sel.clear(); renderAll();}
  }
}

function scDown(e){
  if(G.placing) return;
  const h=e.target.dataset.h;
  const el=e.target.closest('[data-id]');
  if(!el) return;
  const id=el.dataset.id; if(!id) return;
  e.stopPropagation();

  if(h){
    const c=gc(id); if(!c) return;
    if(h==='rot'){
      const r=el.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;
      G.drag={type:'rotate',id,cx,cy,sa:Math.atan2(e.clientY-cy,e.clientX-cx)*180/Math.PI,or:c.rot||0};
    } else {
      G.drag={type:'resize',id,h,sx:e.clientX,sy:e.clientY,ox:c.x,oy:c.y,ow:c.w,oh:c.h};
    }
    return;
  }

  if(!G.sel.has(id)){
    if(!e.shiftKey) G.sel.clear();
    G.sel.add(id); renderAll();
  } else if(e.shiftKey){
    G.sel.delete(id); renderAll(); return;
  }
  const snap0=selArr().map(c=>({id:c.id,ox:c.x,oy:c.y}));
  G.drag={type:'move',sx:e.clientX,sy:e.clientY,comps:snap0};
}

function vpMove(e){
  const r=VP().getBoundingClientRect();
  const sp=vpToScene(e.clientX,e.clientY);
  document.getElementById('sb-xy').textContent=`${Math.round(sp.x)}, ${Math.round(sp.y)}`;
  if(!G.drag) return;

  if(G.drag.type==='pan'){
    G.vp.x=G.drag.ox+(e.clientX-G.drag.sx);
    G.vp.y=G.drag.oy+(e.clientY-G.drag.sy);
    applyVp(); return;
  }
  if(G.drag.type==='rubber'){
    const cx=e.clientX-r.left,cy=e.clientY-r.top;
    const rb=document.getElementById('rb');
    const rx=Math.min(cx,G.drag.sx),ry=Math.min(cy,G.drag.sy),rw=Math.abs(cx-G.drag.sx),rh=Math.abs(cy-G.drag.sy);
    rb.style.left=rx+'px';rb.style.top=ry+'px';rb.style.width=rw+'px';rb.style.height=rh+'px';
    G.drag.ex=cx; G.drag.ey=cy; return;
  }
  if(G.drag.type==='move'){
    const dx=(e.clientX-G.drag.sx)/G.vp.z,dy=(e.clientY-G.drag.sy)/G.vp.z;
    G.drag.comps.forEach(({id,ox,oy})=>{
      const c=gc(id); if(!c) return;
      c.x=snapV(Math.max(0,ox+dx)); c.y=snapV(Math.max(0,oy+dy));
      const el=document.getElementById('g'+id);
      if(el){el.style.left=c.x+'px';el.style.top=c.y+'px';}
    }); return;
  }
  if(G.drag.type==='resize'){
    const dx=(e.clientX-G.drag.sx)/G.vp.z,dy=(e.clientY-G.drag.sy)/G.vp.z;
    const c=gc(G.drag.id); if(!c) return;
    const {h,ox,oy,ow,oh}=G.drag;
    if(h.includes('e')) c.w=snapV(Math.max(32,ow+dx));
    if(h.includes('s')) c.h=snapV(Math.max(16,oh+dy));
    if(h.includes('w')){const nw=snapV(Math.max(32,ow-dx));c.x=snapV(ox+(ow-nw));c.w=nw;}
    if(h.includes('n')){const nh=snapV(Math.max(16,oh-dy));c.y=snapV(oy+(oh-nh));c.h=nh;}
    const el=document.getElementById('g'+c.id);
    if(el){el.style.cssText+=`;left:${c.x}px;top:${c.y}px;width:${c.w}px;height:${c.h}px`;} return;
  }
  if(G.drag.type==='rotate'){
    const a=Math.atan2(e.clientY-G.drag.cy,e.clientX-G.drag.cx)*180/Math.PI;
    const c=gc(G.drag.id); if(!c) return;
    c.rot=G.drag.or+(a-G.drag.sa);
    const el=document.getElementById('g'+c.id);
    if(el) el.style.transform=`rotate(${c.rot}deg)`;
  }
}

function vpUp(e){
  if(!G.drag) return;
  if(G.drag.type==='rubber'){
    document.getElementById('rb').style.display='none';
    if(G.drag.ex!==undefined){
      const ax=(Math.min(G.drag.sx,G.drag.ex)-G.vp.x)/G.vp.z;
      const ay=(Math.min(G.drag.sy,G.drag.ey)-G.vp.y)/G.vp.z;
      const bx=(Math.max(G.drag.sx,G.drag.ex)-G.vp.x)/G.vp.z;
      const by=(Math.max(G.drag.sy,G.drag.ey)-G.vp.y)/G.vp.z;
      G.scene.comps.forEach(c=>{if(c.x<bx&&c.x+c.w>ax&&c.y<by&&c.y+c.h>ay)G.sel.add(c.id);});
    }
  }
  VP().classList.remove('panning');
  const t=G.drag.type; G.drag=null;
  if(t==='resize'||t==='rotate') renderAll();
  else renderAll();
}

function vpWheel(e){
  e.preventDefault();
  const r=VP().getBoundingClientRect();
  const mx=e.clientX-r.left,my=e.clientY-r.top;
  if(e.ctrlKey||e.metaKey){
    const oz=G.vp.z, dz=e.deltaY<0?0.05:-0.05;
    G.vp.z=clamp(oz+dz,0.06,3);
    G.vp.x=mx-(mx-G.vp.x)*(G.vp.z/oz);
    G.vp.y=my-(my-G.vp.y)*(G.vp.z/oz);
  } else {
    G.vp.x-=e.deltaX; G.vp.y-=e.deltaY;
  }
  applyVp();
}

function vpClick(e){
  if(!G.placing) return;
  const sp=vpToScene(e.clientX,e.clientY);
  const def=D[G.placing]; if(!def) return;
  const c={id:uid(),type:G.placing,x:snapV(sp.x-def.w/2),y:snapV(sp.y-def.h/2),w:def.w,h:def.h,rot:0,op:1,br:0,shd:false,props:{...def.p}};
  G.scene.comps.push(c);
  G.sel.clear(); G.sel.add(c.id);
  cancelPlace();
  renderAll();
}

/* ─── ALIGN / ZORDER ─── */
function align(m){
  const cs=selArr(); if(!cs.length) return;
  const minX=Math.min(...cs.map(c=>c.x)),maxX=Math.max(...cs.map(c=>c.x+c.w));
  const minY=Math.min(...cs.map(c=>c.y)),maxY=Math.max(...cs.map(c=>c.y+c.h));
  cs.forEach(c=>{
    if(m==='left')c.x=minX;
    else if(m==='right')c.x=maxX-c.w;
    else if(m==='cx')c.x=Math.round((minX+maxX)/2-c.w/2);
    else if(m==='top')c.y=minY;
    else if(m==='bot')c.y=maxY-c.h;
    else if(m==='cy')c.y=Math.round((minY+maxY)/2-c.h/2);
  });
  renderAll();
}
function zord(d){
  const id=selOne()?.id; if(!id) return;
  const idx=G.scene.comps.findIndex(c=>c.id===id);
  if(d>0&&idx<G.scene.comps.length-1)[G.scene.comps[idx],G.scene.comps[idx+1]]=[G.scene.comps[idx+1],G.scene.comps[idx]];
  else if(d<0&&idx>0)[G.scene.comps[idx],G.scene.comps[idx-1]]=[G.scene.comps[idx-1],G.scene.comps[idx]];
  renderAll();
}
function dup(){
  selArr().forEach(c=>{const nc={...c,id:uid(),x:c.x+20,y:c.y+20,props:{...c.props}};G.scene.comps.push(nc);G.sel.add(nc.id);});
  renderAll();
}

function renderCompProps(){
  const panel=document.getElementById('rpc');
  const c=selOne();
  if(!c){panel.innerHTML=`<div class="pempty"><i class="fa fa-sliders"></i>Select a component</div>`;return;}
  const p=c.props||{};
  const ri=(lbl,inp)=>`<div class="pr"><span class="plbl">${lbl}</span>${inp}</div>`;
  const ii=(k,t,ex='')=>`<input class="pi" type="${t}" value="${p[k]!==undefined?p[k]:''}" ${ex} onchange="upP('${c.id}','${k}',${t==='number'?'+this.value':'this.value'})"/>`;
  const si=(k,os)=>`<select class="psel" onchange="upP('${c.id}','${k}',this.value)">${os.map(o=>`<option value="${o.v}" ${p[k]===o.v?'selected':''}>${o.l}</option>`).join('')}</select>`;
  let rows='';
  if(p.label!==undefined) rows+=ri('Label',ii('label','text'));
  if(p.cols!==undefined)  rows+=ri('Columns',ii('cols','number','min="1" max="20"'));
  if(p.rows!==undefined)  rows+=ri('Rows',ii('rows','number','min="1" max="20"'));
  if(p.slots!==undefined) rows+=ri('Slots',ii('slots','number','min="1" max="20"'));
  if(p.slotSize!==undefined) rows+=ri('Slot Sz',ii('slotSize','number','min="20" max="120"'));
  if(p.gap!==undefined)   rows+=ri('Gap',ii('gap','number','min="0" max="20"'));
  if(p.value!==undefined) rows+=ri('Value',ii('value','number',`min="0" max="${p.max||100}"`));
  if(p.max!==undefined)   rows+=ri('Max',ii('max','number','min="1"'));
  if(p.color!==undefined) rows+=ri('Color',`<input class="pcol" type="color" value="${p.color}" onchange="upP('${c.id}','color',this.value)"/>`);
  if(p.shape!==undefined) rows+=ri('Shape',si('shape',[{v:'circle',l:'Circle'},{v:'square',l:'Square'}]));
  if(p.name!==undefined)  rows+=ri('Name',ii('name','text'));
  if(p.level!==undefined) rows+=ri('Level',ii('level','number','min="1"'));
  if(p.amount!==undefined)rows+=ri('Amount',ii('amount','number','min="0"'));
  if(p.text!==undefined)  rows+=ri('Text',ii('text','text'));
  if(p.size!==undefined)  rows+=ri('Size',ii('size','number','min="8" max="72"'));
  if(p.align!==undefined) rows+=ri('Align',si('align',[{v:'left',l:'Left'},{v:'center',l:'Center'},{v:'right',l:'Right'}]));
  panel.innerHTML=rows?`<div class="psec"><div class="pslbl">${D[c.type]?.l||c.type}</div>${rows}</div>`:`<div class="pempty">No props</div>`;
}

.xhwrap{display:flex;align-items:center;justify-content:center;height:100%;color:var(--ca,rgba(255,255,255,.9));position:relative;}.xhwrap::before,.xhwrap::after{content:'';position:absolute;background:currentColor;border-radius:1px;}.xhwrap::before{width:11px;height:1.5px;}.xhwrap::after{width:1.5px;height:11px;}.xhdot{width:3px;height:3px;border-radius:50%;border:1px solid currentColor;position:absolute;}
.txwrap{display:flex;align-items:center;height:100%;padding:0 5px;}.txin{color:var(--ct,#fff);font-weight:600;}`;
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>${G.scene.name||'Game UI'}</title>

<style>*{box-sizing:border-box;margin:0;padding:0}body{background:#000;overflow:hidden;width:${w}px;height:${h}px}:root{${tvars[th]||tvars.d}}${css}</style></head>
<body><div id="ui" style="position:relative;width:${w}px;height:${h}px">${ch}</div>
<!-- HYDRA Game UI Studio export — ${new Date().toISOString()} -->

</body></html>`;

  a.href='data:text/html,'+encodeURIComponent(html);

/* ─── AI ─── */
const AISYS=`You are the Grudge Studio Game UI AI in HYDRA Game UI Studio.

COMPONENT TYPES:
inventory-grid: props{cols,rows,slotSize,gap,label}
equipment-slots: props{label}
hotbar: props{slots,slotSize,label}
healthbar/manabar/xp-bar: props{value,max,label,color}
minimap: props{shape:"circle"|"square",label}
portrait: props{name,level}
currency-display: props{amount,label}
chat-window: props{label}
skill-tree: props{label}
shop-panel: props{label}
crosshair: props{}
text-label: props{text,size,align:"left"|"center"|"right"}

CANVAS: origin top-left, default 1920×1080.
THEME CODES: "d"=Hydra Dark "f"=Fantasy "c"=Cyberpunk "q"=FPS

LAYOUT PATTERNS:
RPG: portrait+HP/MP/XP bottom-left, hotbar center-bottom, inventory+minimap right
FPS: crosshair center, health bottom-left, ammo text bottom-right, minimap top-right
MOBA: hotbar center-bottom, HP/MP flanking portrait, minimap bottom-right
Inventory screen: equipment left, grid center, shop right

RESPOND ONLY VALID JSON:
{"action":"add"|"replace"|"update"|"remove"|"clear","components":[...],"ids":[],"updates":{},"scene_props":{},"message":"..."}
add/replace: full objects with id,type,x,y,w,h,rot:0,op:1,br:0,shd:false,props:{...}
update: {id:{x?,y?,w?,h?,rot?,op?,props:{...}}}
scene_props: {theme,resolution:{w,h}}
Generate short IDs like "hp1","hb1","inv1".`;

const AIQS=['RPG HUD','FPS layout','Inventory screen','Add minimap top-right','Add hotbar bottom','HP + mana bars','Cyberpunk theme','Clear all'];

function buildAIQuick(){
  document.getElementById('aqrow').innerHTML=AIQS.map(q=>`<div class="aqbtn" onclick="aiSendMsg(${JSON.stringify(q)})">${q}</div>`).join('');
}

function aiKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendAI();}}
function sendAI(){const v=document.getElementById('aiin').value.trim();if(v){document.getElementById('aiin').value='';aiSendMsg(v);}}

function aiAppend(role,text,err=false){
  const el=document.createElement('div');el.className='amsg '+role;
  el.innerHTML=`<div class="arole">${role==='user'?'You':'HYDRA AI'}</div><div class="abub${err?' aerr':''}">${String(text).replace(/</g,'&lt;')}</div>`;
  document.getElementById('amsgs').appendChild(el);
  document.getElementById('amsgs').scrollTop=99999;
}
function aiThink(on){
  document.getElementById('ath')?.remove();
  if(on){const el=document.createElement('div');el.id='ath';el.className='athink';el.innerHTML='<div class="adot"></div><div class="adot"></div><div class="adot"></div> Designing…';document.getElementById('amsgs').appendChild(el);document.getElementById('amsgs').scrollTop=99999;}
}

async function aiSendMsg(msg){
  if(G.ai.busy) return;
  G.ai.busy=true;
  document.getElementById('aisend').disabled=true;
  setRT('a');
  aiAppend('user',msg);
  aiThink(true);

  const ctx=JSON.stringify({res:G.scene.resolution,theme:G.scene.theme,comps:G.scene.comps.map(c=>({id:c.id,type:c.type,x:c.x,y:c.y,w:c.w,h:c.h,props:c.props}))});
  const msgs=[...G.ai.msgs,{role:'user',content:`Scene:${ctx}\nRequest:${msg}`}];

  try{
    let text='';
    const key=document.getElementById('aikey').value.trim()||G.ai.key;

    if(key.startsWith('sk-ant')){
      const r=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:2048,system:AISYS,messages:msgs})
      });
      const d=await r.json();
      if(!r.ok)throw new Error(d.error?.message||`Anthropic API ${r.status}`);
      text=d.content?.[0]?.text||'';
    } else {
      const r=await fetch('https://ai.grudge-studio.com/ai/chat',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        credentials:'include',
        body:JSON.stringify({system:AISYS,messages:msgs,model:'claude-sonnet-4-6',max_tokens:2048})
      });
      if(!r.ok){
        const et=await r.text().catch(()=>'');
        throw new Error(`ALE worker HTTP ${r.status}${et?' — '+et.slice(0,100):''}\n\nTo use AI: paste an Anthropic API key (sk-ant-…) in the field below.`);
      }
      const d=await r.json();
      text=d.content?.[0]?.text||d.content||d.text||d.response||d.message||(typeof d==='string'?d:'');
      if(!text)throw new Error('Unexpected ALE response: '+JSON.stringify(d).slice(0,200));
    }

    const jm=text.match(/\{[\s\S]*\}/);
    if(!jm)throw new Error('No JSON in response:\n'+text.slice(0,300));
    const act=JSON.parse(jm[0]);
    applyAI(act);
    G.ai.msgs.push({role:'user',content:`Scene:${ctx}\nRequest:${msg}`});
    G.ai.msgs.push({role:'assistant',content:text});
    if(G.ai.msgs.length>16)G.ai.msgs=G.ai.msgs.slice(-16);
    aiThink(false);
    aiAppend('ai',act.message||'Done!');
    renderAll();
  }catch(err){
    aiThink(false);
    aiAppend('ai',err.message,true);
  }
  G.ai.busy=false;
  document.getElementById('aisend').disabled=false;
}

function applyAI(a){
  if(a.scene_props){
    if(a.scene_props.theme)setTheme(a.scene_props.theme);
    if(a.scene_props.resolution){G.scene.resolution=a.scene_props.resolution;document.getElementById('res-sel').value=`${a.scene_props.resolution.w}x${a.scene_props.resolution.h}`;}
  }
  const en=c=>{if(!c.id)c.id=uid();c.rot=c.rot||0;c.op=c.op!==undefined?c.op:1;c.br=c.br||0;c.shd=c.shd||false;if(!c.props)c.props={};return c;};
  if(a.action==='clear')G.scene.comps=[];
  else if(a.action==='replace'||a.action==='replace_scene')G.scene.comps=(a.components||[]).map(en);
  else if(a.action==='add')(a.components||[]).forEach(c=>G.scene.comps.push(en(c)));
  else if(a.action==='remove'){const ids=new Set(a.ids||[]);G.scene.comps=G.scene.comps.filter(c=>!ids.has(c.id));}
  else if(a.action==='update')Object.entries(a.updates||{}).forEach(([id,p])=>{const c=gc(id);if(!c)return;['x','y','w','h','rot','op','br','shd'].forEach(k=>{if(p[k]!==undefined)c[k]=p[k];});if(p.props)Object.assign(c.props,p.props);});
  G.sel.clear();
}

/* ─── KEYBOARD ─── */
document.addEventListener('keydown',e=>{
  const inf=e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT';
  if(e.key==='Escape'){G.placing?cancelPlace():(G.sel.clear(),renderAll());return;}
  if(e.key===' '&&!inf){e.preventDefault();setTool(G.tool==='pan'?'sel':'pan');return;}
  if(e.key==='v'&&!inf){setTool('sel');return;}
  if(e.key==='h'&&!inf){setTool('pan');return;}
  if(inf)return;
  if(e.key==='Delete'||e.key==='Backspace')selArr().forEach(c=>delC(c.id));
  if((e.ctrlKey||e.metaKey)&&e.key==='d'){e.preventDefault();dup();}
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();doSave();}
  if((e.ctrlKey||e.metaKey)&&e.key==='e'){e.preventDefault();doExport();}
  const step=e.shiftKey?10:1;
  if(e.key==='ArrowLeft')selArr().forEach(c=>{c.x-=step;renderAll();});
  if(e.key==='ArrowRight')selArr().forEach(c=>{c.x+=step;renderAll();});
  if(e.key==='ArrowUp')selArr().forEach(c=>{c.y-=step;renderAll();});
  if(e.key==='ArrowDown')selArr().forEach(c=>{c.y+=step;renderAll();});
});

/* ─── INIT ─── */
document.getElementById('scene-name').addEventListener('change',e=>G.scene.name=e.target.value);
document.getElementById('aikey').value=G.ai.key;
buildPal();
buildAIQuick();
initVP();
renderAll();
setTimeout(fitView,80);
setTimeout(()=>aiAppend('ai','Ready. Try a quick-start or describe your layout. Example: "RPG HUD 1920×1080 fantasy theme with inventory and minimap"'),400);
