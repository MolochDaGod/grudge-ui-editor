    <script type="module" crossorigin src="./assets/index-CvSnJIJG.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-C7sTteZB.css">
    <link rel="stylesheet" href="./equipment-tactical.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700;800&family=Cinzel:wght@500;700&display=swap" rel="stylesheet">
    <style>
      /* ── Scale: stretch preview frame to fill available height ── */
      .stage__view {
        align-items: stretch !important;
      }
      .stage__frame {
        flex: 1 1 0 !important;
        min-height: 0 !important;
        height: 100% !important;
      }
      .stage__center {
        height: 100% !important;
        min-height: 0 !important;
      }

      /* ── Icon fix: slot grid was 16×16 making icons render at ~13px ── */
      .gk-slot {
        grid-template-columns: 1fr !important;
        grid-template-rows: 1fr !important;
      }

      /* ── Scale: increase slot size and panel breathing room ── */
      .gk-root {
        --gk-slot-size: 72px !important;
      }

      /* ── UX: improve item slot hover feedback ── */
      .gk-slot {
        transition: filter 0.15s, box-shadow 0.15s !important;
      }
      .gk-slot:hover {
        filter: brightness(1.25) !important;
      }

      /* ── UX: make sidebar scrollbar less intrusive ── */
      aside::-webkit-scrollbar { width: 4px; }
      aside::-webkit-scrollbar-track { background: transparent; }
      aside::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

      /* ── Scale: increase gk-grid slot spacing slightly ── */
      .gk-grid {
        gap: 6px !important;
      }

      /* ── UX: stage view background subtle gradient instead of flat black ── */
      .stage__view {
        background: radial-gradient(ellipse at 50% 40%, rgba(74,222,128,0.04) 0%, transparent 70%) !important;
      }

      /* ── topbar: active tab indicator more visible ── */
      .topbar__tab.is-active {
        font-weight: 600;
      }

      /* ── Hydra brand: topbar wordmark injection ── */
      body::before {
        content: '';
        display: block;
        height: 0;
      }

      /* ── Hydra brand: accent color cascade ── */
      :root {
        --hydra: #4ade80;
        --hydra-s: rgba(74,222,128,0.1);
      }

      /* ── Topbar Hydra hint: active accent uses hydra-green ── */
      .topbar__tab.is-active,
      [class*="tab"][class*="active"],
      [class*="tab"][aria-selected="true"] {
        color: #4ade80 !important;
        border-bottom-color: #4ade80 !important;
      }

      /* ── App layout under fleet nav ── */
      #root { min-height: calc(100vh - 46px); }

      /* ── Tool link in header: Input Configurator pill ── */
      .topbar__right a[href*="hotkeys"],
      a[href="/hotkeys"] {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 0.7rem;
        padding: 4px 10px;
        border-radius: 8px;
        background: rgba(74,222,128,0.08);
        border: 1px solid rgba(74,222,128,0.18);
        color: #4ade80;
        text-decoration: none;
        font-weight: 600;
        letter-spacing: 0.02em;
        transition: background 0.1s;
      }
      a[href="/hotkeys"]:hover {
        background: rgba(74,222,128,0.14);
      }

      /* ── Prim 3D assets promo strip ── */
      #prim-banner {
        position: fixed;
        bottom: 16px;
        right: 16px;
        z-index: 9999;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        border-radius: 12px;
        background: rgba(12, 13, 18, 0.94);
        border: 1px solid rgba(74, 222, 128, 0.22);
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
        font-family: 'Inter', system-ui, sans-serif;
        font-size: 12px;
        color: #e2e4ef;
        text-decoration: none;
        transition: border-color 0.15s, transform 0.15s;
        max-width: 280px;
      }
      #prim-banner:hover {
        border-color: rgba(74, 222, 128, 0.45);
        transform: translateY(-2px);
      }
      #prim-banner strong {
        display: block;
        font-family: 'Space Grotesk', sans-serif;
        font-size: 11px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #c8a84b;
        margin-bottom: 2px;
      }
      #prim-banner span { color: #6b7088; font-size: 11px; line-height: 1.4; }
      #prim-banner .arrow { color: #4ade80; font-weight: 700; flex-shrink: 0; }
      @media (max-width: 600px) {
        #prim-banner { left: 12px; right: 12px; bottom: 12px; max-width: none; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <a id="prim-banner" href="/assets">
      <div>
        <strong>Prim 3D Assets</strong>
        <span>276 vehicles, islands, structures &amp; animations on CDN</span>
      </div>
      <span class="arrow">→</span>
    </a>
    <script src="./grudge-shell.js"></script>
    <script src="./grudge-enhancements.js" defer></script>
  </body>
</html>
